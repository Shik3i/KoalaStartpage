<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Koala Startpage — Dashboard for Koala projects, services, and system monitoring.">
    <meta name="robots" content="noindex, nofollow">
    <title>Koala Startpage</title>

    <!-- Favicon & PWA -->
    <link rel="icon" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">

    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Koala Startpage">
    <meta property="og:description" content="Dashboard for Koala projects, services, and system monitoring.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://start.koalastuff.net/icon.svg">

    <!-- Set lang class ASAP to prevent flash of wrong language -->
    <script src="js/lang-init.js"></script>

    <!-- Custom Styles (Includes compiled local fonts and icons) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col">

    <!-- Animated Background Mesh -->
    <div class="bg-mesh" aria-hidden="true"></div>

    <!-- Main Content -->
    <main class="relative z-10 flex-1 flex items-center justify-center p-4 sm:p-6 lg:p-8">
        <div class="max-w-6xl w-full mx-auto">

            <!-- Top Bar: Branding + Language Toggle -->
            <div class="flex items-center justify-between mb-6 md:mb-8 fade-in">
                <!-- Koala Branding -->
                <div class="flex items-center gap-2.5">
                    <span class="text-2xl">🐨</span>
                    <span class="text-lg font-semibold tracking-tight text-gray-300">
                        Koala<span class="text-indigo-400">Stuff</span>
                    </span>
                </div>

                <!-- Language Toggle -->
                <div class="lang-toggle rounded-full flex items-center p-0.5 gap-0.5">
                    <button id="lang-de" class="lang-btn px-3 py-1.5 rounded-full text-xs font-medium text-gray-400">DE</button>
                    <button id="lang-en" class="lang-btn px-3 py-1.5 rounded-full text-xs font-medium text-gray-400">EN</button>
                </div>
            </div>

            <!-- Bento Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-5">

                <!-- ╔═══ 1. Clock & Greeting (Hero) ═══╗ -->
                <div class="bento-tile bento-tile--hero rounded-2xl lg:rounded-3xl p-6 lg:p-8 flex flex-col justify-end md:col-span-2 lg:col-span-2 relative fade-in">
                    <!-- Decorative gradient orb -->
                    <div class="absolute -top-20 -right-20 w-60 h-60 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none" aria-hidden="true"></div>
                    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-emerald-500/8 rounded-full blur-3xl pointer-events-none" aria-hidden="true"></div>

                    <div class="relative z-10">
                        <p id="greeting" class="text-xl md:text-2xl font-light text-gray-400 mb-1">Guten Tag</p>
                        <h1 id="current-time" class="text-6xl md:text-7xl lg:text-8xl font-bold tracking-tighter mb-3 text-white">
                            00<span class="clock-colon">:</span>00
                        </h1>
                        <p id="current-date" class="text-base md:text-lg text-gray-500 font-light">…</p>
                    </div>
                </div>

                <!-- ╔═══ 2. Quick Links ═══╗ -->
                <div class="bento-tile rounded-2xl lg:rounded-3xl p-5 lg:p-6 flex flex-col fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="badge-amber p-2 rounded-xl">
                            <i class="ph ph-lightning text-xl"></i>
                        </div>
                        <h3 class="text-base font-semibold" data-i18n="tile_quicklinks">Quick Links</h3>
                    </div>
                    <div class="flex flex-col gap-1.5 flex-1 justify-center">
                        <a href="https://github.com/Shik3i" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="github.com/Shik3i">
                            <i class="ph ph-github-logo text-lg text-gray-400"></i>
                            <span class="font-medium">GitHub</span>
                        </a>
                        <a href="https://status.koalastuff.net" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="status.koalastuff.net">
                            <i class="ph ph-heartbeat text-lg text-emerald-400/80"></i>
                            <span class="font-medium" data-i18n="link_uptime">Status-Seite</span>
                        </a>
                    </div>
                </div>

                <!-- ╔═══ 3. Services ═══╗ -->
                <div class="bento-tile rounded-2xl lg:rounded-3xl p-5 lg:p-6 flex flex-col lg:row-span-2 fade-in overflow-y-auto">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="badge-blue p-2 rounded-xl">
                            <i class="ph ph-rocket-launch text-xl"></i>
                        </div>
                        <h3 class="text-base font-semibold" data-i18n="tile_services">Services</h3>
                    </div>
                    <div class="flex flex-col gap-1 flex-1">
                        <!-- KoalaSync -->
                        <a href="https://sync.koalastuff.net" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="sync.koalastuff.net">
                            <i class="ph ph-arrows-left-right text-lg text-indigo-400/80"></i>
                            <span class="font-medium" data-i18n="link_sync">KoalaSync</span>
                        </a>

                        <div class="h-px bg-white/5 mx-2 my-1.5"></div>

                        <!-- KoalaTimer -->
                        <a href="https://timer.koalastuff.net" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="timer.koalastuff.net">
                            <i class="ph ph-timer text-lg text-purple-400/80"></i>
                            <span class="font-medium" data-i18n="link_timer">KoalaTimer</span>
                        </a>

                        <!-- Timer Subpages (indented) -->
                        <div class="ml-8 flex flex-col gap-0.5">
                            <a href="https://timer.koalastuff.net/blackjack" target="_blank" rel="noopener" class="bento-link flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-xs text-gray-500 hover:text-gray-300">
                                <i class="ph ph-cards text-sm text-amber-400/60"></i>
                                <span data-i18n="link_blackjack">Blackjack</span>
                            </a>
                            <a href="https://timer.koalastuff.net/esports" target="_blank" rel="noopener" class="bento-link flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-xs text-gray-500 hover:text-gray-300">
                                <i class="ph ph-game-controller text-sm text-rose-400/60"></i>
                                <span data-i18n="link_esports">Esports</span>
                            </a>
                            <a href="https://timer.koalastuff.net/news" target="_blank" rel="noopener" class="bento-link flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-xs text-gray-500 hover:text-gray-300">
                                <i class="ph ph-newspaper text-sm text-blue-400/60"></i>
                                <span data-i18n="link_news">News</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- ╔═══ 4. GitHub Releases ═══╗ -->
                <div class="bento-tile rounded-2xl lg:rounded-3xl p-5 lg:p-6 flex flex-col md:col-span-2 lg:col-span-2 fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="badge-gray p-2 rounded-xl">
                            <i class="ph ph-git-merge text-xl"></i>
                        </div>
                        <h3 class="text-base font-semibold" data-i18n="tile_releases">Latest Releases</h3>
                    </div>
                    <div id="releases-container" class="flex-1">
                        <!-- Injected by script.js -->
                    </div>
                </div>

                <!-- ╔═══ 5. Tailscale / Internal ═══╗ -->
                <div class="bento-tile rounded-2xl lg:rounded-3xl p-5 lg:p-6 flex flex-col fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="badge-purple p-2 rounded-xl">
                            <i class="ph ph-lock-key text-xl"></i>
                        </div>
                        <h3 class="text-base font-semibold" data-i18n="tile_internal">Internal</h3>
                    </div>
                    <div class="flex flex-col gap-1.5 flex-1 justify-center">
                        <a href="http://100.68.158.76:5001" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="Dockge — Container Management">
                            <i class="ph ph-package text-lg text-purple-400/70"></i>
                            <span class="font-medium">Dockge</span>
                        </a>
                        <a href="http://100.68.158.76:3000/d/rYdddlPWk/node-exporter-full" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="Grafana — Server Monitoring">
                            <i class="ph ph-chart-line text-lg text-amber-400/70"></i>
                            <span class="font-medium">Grafana</span>
                        </a>
                        <a href="http://100.68.158.76:8200/ngclient/" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="Duplicati — HetznerBox Backup">
                            <i class="ph ph-cloud-arrow-up text-lg text-emerald-400/70"></i>
                            <div class="flex flex-col">
                                <span class="font-medium">Duplicati</span>
                                <span class="text-[0.65rem] text-gray-600">HetznerBox</span>
                            </div>
                        </a>
                        <a href="http://100.99.84.61:8200/ngclient/" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="Duplicati — UnraidBox Backup">
                            <i class="ph ph-cloud-arrow-up text-lg text-emerald-400/70"></i>
                            <div class="flex flex-col">
                                <span class="font-medium">Duplicati</span>
                                <span class="text-[0.65rem] text-gray-600">UnraidBox</span>
                            </div>
                        </a>
                        <a href="http://100.99.84.61/login" target="_blank" rel="noopener" class="bento-link flex items-center gap-3 p-2.5 rounded-xl text-gray-300 text-sm" title="Unraid UI">
                            <i class="ph ph-hard-drives text-lg text-blue-400/70"></i>
                            <div class="flex flex-col">
                                <span class="font-medium">Unraid UI</span>
                                <span class="text-[0.65rem] text-gray-600">UnraidBox</span>
                            </div>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 pb-4 pt-6 flex items-center justify-center gap-3 text-gray-700">
        <a href="datenschutz.html" class="footer-link" data-i18n="footer_privacy">Datenschutz</a>
        <span>·</span>
        <a href="impressum.html" class="footer-link" data-i18n="footer_imprint">Impressum</a>
        <span>·</span>
        <a href="https://github.com/Shik3i/KoalaStartpage" target="_blank" rel="noopener" class="footer-link flex items-center gap-1">
            <i class="ph ph-github-logo"></i>
            <span>© 2026 KoalaStuff</span>
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
